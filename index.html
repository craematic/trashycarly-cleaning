<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrashyCarly Cleaning | Secure Booking | Mesquite, TX</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* Reset & Luxury Base */
* {box-sizing: border-box; margin:0; padding:0;}
:root {
    --primary: #1a1a1a;    /* Midnight Charcoal */
    --accent: #d4af37;     /* Champagne Gold */
    --bg-light: #fdfdfd;   
}

body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg-light);
    color: var(--primary);
    line-height: 1.6;
}

/* Gritty Texture Overlay */
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.04;
    pointer-events: none;
    z-index: 9999;
}

.container {max-width:1100px; margin:0 auto; padding: 0 20px;}

/* MINI CART ICON */
#cart-icon {
    position: fixed; top: 20px; right: 20px;
    background: var(--primary); color: white;
    padding: 15px 25px; font-weight: 700; cursor: pointer;
    z-index: 1001; border: 1px solid var(--accent);
    text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px;
}

/* CART DRAWER */
#cart-drawer {
    position: fixed;
    top: 0; right: -400px;
    width: 380px;
    height: 100vh;
    background: white;
    box-shadow: -10px 0 30px rgba(0,0,0,0.1);
    z-index: 1002;
    transition: 0.4s ease;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
}
#cart-drawer.active { right: 0; }

#cart-content { flex-grow:1; overflow-y:auto; margin:20px 0; border-top: 1px solid #eee; }

/* STRIPE-STYLE OVERLAY */
#payment-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
}

.payment-modal {
    background: white;
    width: 95%;
    max-width: 500px;
    padding: 40px;
    position: relative;
    border-top: 5px solid var(--accent);
}

.payment-modal h2 { font-family: 'Playfair Display'; margin-bottom: 20px; }

.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: #666; }
.form-group input { 
    width: 100%; padding: 12px; border: 1px solid #ddd; 
    font-family: inherit; font-size: 1em; 
}

.card-input-wrapper {
    display: flex;
    align-items: center;
    border: 1px solid #ddd;
    padding: 0 12px;
}
.card-input-wrapper input { border: none; padding: 12px 5px; }

.btn-pay {
    background: var(--primary);
    color: white;
    width: 100%;
    padding: 18px;
    border: none;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}
.btn-pay:hover { background: var(--accent); color: var(--primary); }

.close-modal {
    position: absolute;
    top: 15px; right: 15px;
    cursor: pointer;
    font-size: 1.5em;
    color: #999;
}

/* YOUTUBE WIDGET (MINI) */
#mini-vibe {
    position: fixed;
    bottom: 20px; left: 20px;
    width: 280px; height: 157px;
    z-index: 1000;
    border: 1px solid var(--accent);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* OVERLAY FOR CART BG */
#overlay-bg {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5); display: none; z-index: 1000;
}
</style>
</head>
<body>

<div id="cart-icon" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</div>
<div id="overlay-bg" onclick="toggleCart()"></div>

<div id="cart-drawer">
    <h2 style="font-family:'Playfair Display'">Your Selection</h2>
    <div id="cart-content">
        </div>
    
    <div style="border-top: 2px solid var(--primary); padding-top: 20px;">
        <h3 style="margin-bottom: 20px;">Total: $<span id="cart-total">0</span></h3>
        
        <form id="booking-form" action="https://formspree.io/f/mreyywlq" method="POST">
            <input type="hidden" name="Order_Summary" id="order-summary-input">
            <div class="form-group">
                <input type="text" name="Address" placeholder="Mesquite Service Address" required style="width:100%; padding:12px; border:1px solid #eee;">
            </div>
            <button type="submit" class="btn-pay" style="background:#f4f4f4; color:#333; margin-bottom: 10px;">Request Invoice via Email</button>
        </form>

        <button class="btn-pay" onclick="showPaymentModal()">Pay with Card</button>
        <div id="paypal-button-container" style="margin-top:15px;"></div>
    </div>
</div>

<div id="payment-overlay">
    <div class="payment-modal">
        <span class="close-modal" onclick="showPaymentModal()">×</span>
        <h2>Secure Checkout</h2>
        <p style="font-size: 0.8em; color: #999; margin-bottom: 20px;">Mesquite Residential & Commercial Portal</p>
        
        <div class="form-group">
            <label>Card Information</label>
            <div class="card-input-wrapper">
                <i class="fa-solid fa-credit-card" style="color:#ccc;"></i>
                <input type="text" placeholder="Card Number" style="flex-grow:1;">
                <input type="text" placeholder="MM/YY" style="width:70px; text-align:center;">
                <input type="text" placeholder="CVC" style="width:50px; text-align:center;">
            </div>
        </div>

        <button class="btn-pay" onclick="alert('Demo Mode: Connect Stripe API for live processing.')">
            Pay $<span id="modal-total">0</span>
        </button>
        <p style="text-align:center; font-size:0.65em; margin-top:15px; color:#bbb; text-transform:uppercase; letter-spacing:1px;">
            <i class="fa-solid fa-shield-halved"></i> 256-Bit SSL Encrypted
        </p>
    </div>
</div>

<div id="mini-vibe">
    <iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=OLAK5uy_mM93GVBusPk2W79AC8q5K4NpltG4mtV5A" frameborder="0" allowfullscreen></iframe>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>

<script>
let cart = [];

function toggleCart() {
    const drawer = document.getElementById('cart-drawer');
    const bg = document.getElementById('overlay-bg');
    drawer.classList.toggle('active');
    bg.style.display = (bg.style.display === 'block') ? 'none' : 'block';
}

function showPaymentModal() {
    const overlay = document.getElementById('payment-overlay');
    overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    document.getElementById('modal-total').innerText = document.getElementById('cart-total').innerText;
}

// Function to call from your service cards
function addToCart(name, price) {
    cart.push({name, price});
    updateCartUI();
    if(!document.getElementById('cart-drawer').classList.contains('active')) toggleCart();
}

function updateCartUI() {
    const content = document.getElementById('cart-content');
    const summaryInput = document.getElementById('order-summary-input');
    let total = 0;
    let summaryText = "";

    content.innerHTML = '';
    cart.forEach((item, index) => {
        total += item.price;
        summaryText += `${item.name} ($${item.price}) | `;
        content.innerHTML += `
            <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #eee; font-size:0.9em;">
                <span>${item.name}</span>
                <strong>$${item.price}</strong>
            </div>`;
    });

    document.getElementById('cart-count').innerText = cart.length;
    document.getElementById('cart-total').innerText = total;
    summaryInput.value = `Order for Mesquite, TX: ${summaryText} TOTAL: $${total}`;
}

// PayPal Integration
paypal.Buttons({
    createOrder: function(data, actions) {
        return actions.order.create({
            purchase_units: [{ amount: { value: document.getElementById('cart-total').innerText } }]
        });
    },
    onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
            alert('Payment received! Thank you, ' + details.payer.name.given_name);
        });
    }
}).render('#paypal-button-container');
</script>

</body>
</html>

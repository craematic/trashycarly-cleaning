<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TrashyCarly | Premier Commercial & Estate Sanitation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --gold: #d4af37;
    --onyx: #0a0a0a;
    --slate: #1a1a1a;
    --ivory: #ffffff;
    --safe-area: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--onyx);
    color: var(--ivory);
    overflow-x: hidden;
}

/* Header */
header {
    padding: 15px var(--safe-area);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10, 10, 10, 0.98);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0; z-index: 1000;
    border-bottom: 1px solid #222;
}

.brand { font-family: 'Playfair Display'; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; cursor: pointer; }
.brand span { color: var(--gold); font-weight: 400; font-style: italic; text-transform: lowercase; }

#cart-btn {
    background: var(--gold);
    color: var(--onyx);
    padding: 10px 18px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Transitions */
.view { display: none; min-height: 100vh; animation: fadeIn 0.4s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Hero Section */
.hero {
    padding: 100px var(--safe-area);
    background: linear-gradient(rgba(0,0,0,0.7), var(--onyx)), url('https://images.unsplash.com/photo-1581578731548-c64695ce6958?q=80&w=2070&auto=format&fit=crop');
    background-size: cover; background-position: center;
    text-align: center;
}
.hero h1 { font-family: 'Playfair Display'; font-size: 3rem; margin-bottom: 10px; }
.hero p { color: var(--gold); letter-spacing: 4px; text-transform: uppercase; font-size: 0.8rem; }

/* Grid Styles */
.section-title { padding: 40px var(--safe-area) 10px; font-family: 'Playfair Display'; font-size: 2rem; color: var(--gold); text-align: center; }
.service-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
    padding: 20px var(--safe-area) 100px;
}

.card {
    background: var(--slate);
    border: 1px solid #333;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
.card-img { width: 100%; height: 240px; object-fit: cover; }
.card-body { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; }
.card h3 { font-family: 'Playfair Display'; font-size: 1.4rem; margin-bottom: 10px; }
.card-price { color: var(--gold); font-weight: 700; font-size: 1.2rem; margin-bottom: 15px; }

/* Service Page View */
.detail-header { height: 50vh; background-size: cover; background-position: center; position: relative; }
.detail-content {
    max-width: 800px; margin: -100px auto 100px; background: var(--onyx); padding: 50px var(--safe-area); border: 1px solid var(--gold); position: relative; z-index: 10;
}
.back-link { margin-bottom: 30px; color: var(--gold); cursor: pointer; text-transform: uppercase; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; }

/* Buttons & Cart */
.btn-gold {
    background: var(--gold); color: var(--onyx); border: none; padding: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; font-size: 0.75rem; width: 100%;
}
.btn-outline {
    background: transparent; border: 1px solid #444; color: white; padding: 12px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; width: 100%; margin-top: 10px; cursor: pointer;
}

#drawer {
    position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
    background: #080808; z-index: 2000; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    padding: 40px var(--safe-area); display: flex; flex-direction: column;
}
#drawer.active { right: 0; }
.cart-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #222; }

/* Pay Methods */
.pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center; padding: 30px 0; border-top: 1px solid #222; margin-top: 30px; }
.pay-grid i { font-size: 2rem; opacity: 0.8; }
.cashapp-text { color: #00d632; font-weight: 800; font-size: 0.9rem; }

#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 1500; }
</style>
</head>
<body>

<header>
    <div class="brand" onclick="showView('catalog')">TRASHYCARLY <span>hospitality</span></div>
    <div id="cart-btn" onclick="toggleCart()">
        <i class="fa-solid fa-briefcase"></i> (<span id="count">0</span>)
    </div>
</header>

<div id="catalog" class="view active">
    <div class="hero">
        <p>Premium Dallas & Mesquite Sanitation</p>
        <h1>Commercial Excellence.</h1>
    </div>
    
    <h2 class="section-title">The Master List</h2>
    <div class="service-grid" id="service-list">
        </div>
</div>

<div id="detail" class="view">
    <div id="detail-img" class="detail-header"></div>
    <div class="detail-content">
        <div class="back-link" onclick="showView('catalog')"><i class="fa-solid fa-arrow-left"></i> Back to Collections</div>
        <h1 id="detail-title" style="font-family:'Playfair Display'; font-size: 2.5rem; margin-bottom: 15px;"></h1>
        <div id="detail-price" class="card-price" style="font-size: 1.8rem; margin-bottom: 25px;"></div>
        <p id="detail-desc" style="color:#ccc; line-height: 1.8; margin-bottom: 40px; font-size: 1rem;"></p>
        
        <div style="margin-bottom: 30px;">
            <label style="text-transform: uppercase; font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; display: block;">Booking Quantity / Units</label>
            <div style="background:#000; border:1px solid #333; display:flex; align-items:center; justify-content:space-between; padding:15px 25px;">
                <span>Units</span>
                <input type="number" id="detail-qty" value="1" min="1" style="background:none; border:none; color:white; width:50px; text-align:center; font-size: 1.2rem; font-weight: 700;">
            </div>
        </div>
        <button class="btn-gold" id="detail-add-btn">Add to Reservation</button>
    </div>
</div>

<div id="overlay" onclick="toggleCart()"></div>
<div id="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
        <h2 style="font-family:'Playfair Display'; font-size:2rem;">Current Dossier</h2>
        <span onclick="toggleCart()" style="font-size:2.5rem; cursor:pointer;">&times;</span>
    </div>
    <div id="cart-items" style="flex-grow:1; overflow-y:auto;"></div>
    
    <div style="margin-top:auto;">
        <div style="display:flex; justify-content:space-between; font-size:1.6rem; font-family:'Playfair Display'; margin-bottom:20px; border-top: 1px solid var(--gold); padding-top: 20px;">
            <span>Investment</span>
            <span id="total-val" style="color:var(--gold)">$0</span>
        </div>
        
        <div class="pay-grid">
            <div><i class="fa-brands fa-apple-pay"></i><br><small>Apple Pay</small></div>
            <div><i class="fa-brands fa-google-pay"></i><br><small>Google Pay</small></div>
            <div><span class="cashapp-text">$ CashApp</span><br><small>Secure Transfer</small></div>
        </div>
        
        <button class="btn-gold" onclick="alert('Proceeding to Secure Checkout Gateway...')">Request Private Invoice</button>
    </div>
</div>

<script>
const services = [
    {
        id: 'office',
        name: 'Executive Office Detail',
        price: 325,
        img: 'https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2069&auto=format&fit=crop',
        short: 'Full-service nightly sanitation for corporate firms.',
        desc: 'Our premier commercial package designed for executive suites. Includes surgical-grade surface disinfection, panoramic glass cleaning, and high-traffic floor care. We use non-abrasive, high-grade chemicals safe for expensive hardwoods and stone.'
    },
    {
        id: 'estate',
        name: 'Estate Management Clean',
        price: 550,
        img: 'https://images.unsplash.com/photo-1600566752355-35792bedcfea?q=80&w=2070&auto=format&fit=crop',
        short: 'White-glove deep cleaning for luxury residences.',
        desc: 'Designed for homes over 4,500 sq ft. This is a top-to-bottom restoration involving museum-grade dusting, marble polishing, and interior appliance detailing. Perfect for homeowners who demand perfection.'
    },
    {
        id: 'medical',
        name: 'Clinical Sanitation',
        price: 475,
        img: 'https://images.unsplash.com/photo-1516549655169-df83a0774514?q=80&w=2070&auto=format&fit=crop',
        short: 'AORN & CDC standard sanitization for healthcare clinics.',
        desc: 'Specialized cleaning for medical environments. Includes electrostatic fogging and thorough disinfection of patient rooms, waiting areas, and surgical theaters using hospital-grade biocides.'
    },
    {
        id: 'kitchen',
        name: 'Industrial Kitchen Scrub',
        price: 850,
        img: 'https://images.unsplash.com/photo-1556910103-1c02745aae4d?q=80&w=2070&auto=format&fit=crop',
        short: 'Heavy-duty BOH degreasing and restoration.',
        desc: 'Critical cleaning for commercial kitchens. We focus on hood ventilation, floor grout sanitation, and degreasing behind heavy cooking equipment to ensure health code compliance.'
    },
    {
        id: 'construction',
        name: 'Post-Construction Finish',
        price: 900,
        img: 'https://images.unsplash.com/photo-1503387762-592dee58c160?q=80&w=2031&auto=format&fit=crop',
        short: 'Dust-free finish for new builds and renovations.',
        desc: 'The final step before move-in. We eliminate fine drywall dust, paint splatters, and adhesive residues from every surface, window, and fixture in your new property.'
    },
    {
        id: 'floors',
        name: 'Marble & Stone Buffing',
        price: 350,
        img: 'https://images.unsplash.com/photo-1560448204-61dc36dc98c8?q=80&w=2070&auto=format&fit=crop',
        short: 'Diamond-pad polishing for high-end flooring.',
        desc: 'Restore the mirror finish to your natural stone floors. We offer high-speed burnishing and sealant application for marble, travertine, and terrazzo surfaces.'
    }
];

let cart = [];

function init() {
    const list = document.getElementById('service-list');
    services.forEach(s => {
        list.innerHTML += `
            <div class="card">
                <img src="${s.img}" class="card-img" alt="${s.name}">
                <div class="card-body">
                    <h3>${s.name}</h3>
                    <div class="card-price">$${s.price}</div>
                    <p style="font-size:0.85rem; color:#888; margin-bottom:20px; flex-grow:1;">${s.short}</p>
                    <button class="btn-gold" onclick="addToCart('${s.name}', ${s.price}, 1)">Quick Add</button>
                    <button class="btn-outline" onclick="openDetail('${s.id}')">View Full Details</button>
                </div>
            </div>
        `;
    });
}

function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    window.scrollTo(0,0);
}

function openDetail(id) {
    const s = services.find(item => item.id === id);
    document.getElementById('detail-img').style.backgroundImage = `url(${s.img})`;
    document.getElementById('detail-title').innerText = s.name;
    document.getElementById('detail-price').innerText = '$' + s.price;
    document.getElementById('detail-desc').innerText = s.desc;
    document.getElementById('detail-qty').value = 1;
    document.getElementById('detail-add-btn').onclick = () => {
        const q = parseInt(document.getElementById('detail-qty').value);
        addToCart(s.name, s.price, q);
    };
    showView('detail');
}

function addToCart(name, price, qty) {
    const existing = cart.find(i => i.name === name);
    if(existing) { existing.qty += qty; } else { cart.push({name, price, qty}); }
    updateUI();
    toggleCart();
}

function toggleCart() {
    const d = document.getElementById('drawer');
    const o = document.getElementById('overlay');
    d.classList.toggle('active');
    o.style.display = (o.style.display === 'block') ? 'none' : 'block';
}

function updateUI() {
    const itemsCont = document.getElementById('cart-items');
    let total = 0, count = 0;
    itemsCont.innerHTML = '';
    cart.forEach(item => {
        total += (item.price * item.qty);
        count += item.qty;
        itemsCont.innerHTML += `
            <div class="cart-item">
                <div>
                    <div style="font-weight:700;">${item.name}</div>
                    <div style="font-size:0.75rem; color:var(--gold)">${item.qty} Unit(s) @ $${item.price}</div>
                </div>
                <div style="font-weight:700">$${item.price * item.qty}</div>
            </div>`;
    });
    document.getElementById('count').innerText = count;
    document.getElementById('total-val').innerText = '$' + total.toLocaleString();
}

init();
</script>

</body>
</html>
